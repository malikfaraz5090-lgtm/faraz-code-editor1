name: Build APK

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: android-actions/setup-android@v3
      
      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH
          
      - name: Create Project
        run: |
          rm -rf android
          mkdir -p android/app/src/main/java/com/faraz/codeeditor
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/assets/www
          
      - name: Create settings.gradle
        run: |
          cat > android/settings.gradle << 'END'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = 'FarazEditor'
          include ':app'
          END
          
      - name: Create root build.gradle
        run: |
          cat > android/build.gradle << 'END'
          plugins {
              id 'com.android.application' version '8.1.0' apply false
          }
          END
          
      - name: Create app build.gradle
        run: |
          cat > android/app/build.gradle << 'END'
          plugins {
              id 'com.android.application'
          }
          
          android {
              namespace 'com.faraz.codeeditor'
              compileSdk 33
              
              defaultConfig {
                  applicationId 'com.faraz.codeeditor'
                  minSdk 22
                  targetSdk 33
                  versionCode 1
                  versionName '1.0.0'
              }
              
              buildTypes {
                  debug {
                      debuggable true
                  }
              }
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          END
          
      - name: Create gradle.properties
        run: |
          cat > android/gradle.properties << 'END'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          END
          
      - name: Create AndroidManifest.xml
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'END'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:label="Faraz Code Editor"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          END
          
      - name: Create MainActivity.java
        run: |
          cat > android/app/src/main/java/com/faraz/codeeditor/MainActivity.java << 'END'
          package com.faraz.codeeditor;
          
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebSettings;
          import androidx.appcompat.app.AppCompatActivity;
          
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  WebView webView = new WebView(this);
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setAllowFileAccess(true);
                  
                  webView.loadUrl("file:///android_asset/www/index.html");
                  setContentView(webView);
              }
          }
          END
          
      - name: Create Resource Files
        run: |
          cat > android/app/src/main/res/values/styles.xml << 'END'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.DayNight.NoActionBar">
                  <item name="colorPrimary">#1e1e1e</item>
                  <item name="android:statusBarColor">#1e1e1e</item>
              </style>
          </resources>
          END
          
          cat > android/app/src/main/res/values/strings.xml << 'END'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Faraz Code Editor</string>
          </resources>
          END
          
      - name: Create Web Files
        run: |
          if [ -f "index.html" ]; then
            cp index.html android/app/src/main/assets/www/
          else
            cat > android/app/src/main/assets/www/index.html << 'END'
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Faraz Editor</title>
              <style>
                  body { font-family: Arial; background: #1e1e1e; color: #fff; 
                         display: flex; justify-content: center; align-items: center; 
                         height: 100vh; margin: 0; }
                  h1 { color: #007acc; }
              </style>
          </head>
          <body>
              <h1>🚀 Faraz Code Editor</h1>
          </body>
          </html>
          END
          fi
          
          [ -f "style.css" ] && cp style.css android/app/src/main/assets/www/
          [ -f "app.js" ] && cp app.js android/app/src/main/assets/www/
          [ -f "manifest.json" ] && cp manifest.json android/app/src/main/assets/www/
          
          echo "Files in assets:"
          ls -la android/app/src/main/assets/www/
          
      - name: Build APK
        run: |
          cd android
          gradle assembleDebug --no-daemon --stacktrace
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Faraz-Code-Editor-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

name: Build APK

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: android-actions/setup-android@v3
      
      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH
          
      - name: Create Project
        run: |
          rm -rf android
          mkdir -p android/app/src/main/java/com/faraz/codeeditor
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/assets/www
          
          # Create app icon
          cat > android/app/src/main/res/drawable/ic_launcher.xml << 'END'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#1e1e1e"
                  android:pathData="M54,54m-54,0a54,54 0,1 1,108 0a54,54 0,1 1,-108 0"/>
              <path android:strokeColor="#007acc" android:strokeWidth="6"
                  android:fillColor="#00000000"
                  android:pathData="M30,35 L20,54 L30,73 M78,35 L88,54 L78,73"/>
              <path android:fillColor="#4ec9b0"
                  android:pathData="M45,38 L55,38 L52,70 L42,70 Z"/>
          </vector>
          END
          
      - name: Create settings.gradle
        run: |
          cat > android/settings.gradle << 'END'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = 'FarazEditor'
          include ':app'
          END
          
      - name: Create root build.gradle
        run: |
          cat > android/build.gradle << 'END'
          plugins {
              id 'com.android.application' version '8.1.0' apply false
          }
          END
          
      - name: Create app build.gradle
        run: |
          cat > android/app/build.gradle << 'END'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.faraz.codeeditor'
              compileSdk 33
              defaultConfig {
                  applicationId 'com.faraz.codeeditor'
                  minSdk 22
                  targetSdk 33
                  versionCode 2
                  versionName '1.1.0'
              }
              buildTypes {
                  debug {
                      debuggable true
                  }
                  release {
                      minifyEnabled true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.10.0'
          }
          END
          
      # ... (rest of the build steps same as before)
      # Add all the remaining steps from the working workflow

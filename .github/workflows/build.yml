name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install Gradle
        run: |
          wget https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip gradle-8.5-bin.zip
          echo "$PWD/gradle-8.5/bin" >> $GITHUB_PATH
      - name: Create Project
        run: |
          rm -rf android
          mkdir -p android/app/src/main/java/com/faraz/codeeditor
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/assets/www
      - name: Build Files
        run: |
          echo 'rootProject.name = "FarazEditor"' > android/settings.gradle
          echo 'include ":app"' >> android/settings.gradle
          cat > android/build.gradle << 'END'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath "com.android.tools.build:gradle:8.2.2" }
          }
          END
          echo 'android.useAndroidX=true' > android/gradle.properties
          echo 'org.gradle.jvmargs=-Xmx2048m' >> android/gradle.properties
          cat > android/app/build.gradle << 'END'
          apply plugin: "com.android.application"
          android {
            namespace "com.faraz.codeeditor"; compileSdk 34
            defaultConfig {
              applicationId "com.faraz.codeeditor"; minSdk 22; targetSdk 34
              versionCode 1; versionName "1.0.0"
            }
            buildTypes { debug { debuggable true } }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          dependencies { implementation "androidx.appcompat:appcompat:1.6.1" }
          END
      - name: Source Files
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'END'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
          <uses-permission android:name="android.permission.INTERNET" />
          <application android:allowBackup="true" android:label="Faraz Editor"
          android:theme="@style/AppTheme" android:usesCleartextTraffic="true">
          <activity android:name=".MainActivity" android:exported="true"
          android:configChanges="orientation|keyboardHidden|screenSize|uiMode">
          <intent-filter>
          <action android:name="android.intent.action.MAIN" />
          <category android:name="android.intent.category.LAUNCHER" />
          </intent-filter></activity></application></manifest>
          END
          cat > android/app/src/main/java/com/faraz/codeeditor/MainActivity.java << 'END'
          package com.faraz.codeeditor;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebSettings;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
          @Override
          protected void onCreate(Bundle b) {
          super.onCreate(b);
          WebView wv = new WebView(this);
          WebSettings ws = wv.getSettings();
          ws.setJavaScriptEnabled(true);
          ws.setDomStorageEnabled(true);
          ws.setAllowFileAccess(true);
          wv.loadUrl("file:///android_asset/www/index.html");
          setContentView(wv);
          }}
          END
          echo '<?xml version="1.0" encoding="utf-8"?>' > android/app/src/main/res/values/styles.xml
          echo '<resources><style name="AppTheme" parent="Theme.AppCompat.NoActionBar">' >> android/app/src/main/res/values/styles.xml
          echo '<item name="android:statusBarColor">#1e1e1e</item></style></resources>' >> android/app/src/main/res/values/styles.xml
          echo '<?xml version="1.0" encoding="utf-8"?>' > android/app/src/main/res/values/strings.xml
          echo '<resources><string name="app_name">Faraz Code Editor</string></resources>' >> android/app/src/main/res/values/strings.xml
          echo '<html><body style="background:#1e1e1e;color:#fff;text-align:center;padding-top:100px"><h1 style="color:#007acc">Faraz Code Editor</h1></body></html>' > android/app/src/main/assets/www/index.html
      - name: Build
        run: |
          cd android
          gradle assembleDebug --no-daemon
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0
          target: android-34

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npm install -g @capacitor/cli

      - name: Create Web Directory
        run: |
          echo "Creating www directory..."
          mkdir -p www
          
          # Copy web files
          for file in index.html style.css app.js manifest.json service-worker.js capacitor.config.json; do
            if [ -f "$file" ]; then
              cp "$file" www/
              echo "Copied: $file"
            else
              echo "Warning: $file not found"
            fi
          done
          
          # Copy assets if exists
          if [ -d "assets" ]; then
            cp -r assets www/
            echo "Copied: assets/"
          fi
          
          echo "www directory contents:"
          ls -la www/

      - name: Initialize Capacitor Android
        run: |
          echo "Initializing Capacitor..."
          
          # Make sure capacitor.config.json exists
          if [ ! -f "capacitor.config.json" ]; then
            cat > capacitor.config.json << 'EOF'
{
  "appId": "com.faraz.codeeditor",
  "appName": "Faraz Code Editor",
  "webDir": "www",
  "bundledWebRuntime": false,
  "server": {
    "androidScheme": "https"
  }
}
EOF
          fi
          
          # Initialize capacitor
          npx cap init "Faraz Code Editor" "com.faraz.codeeditor" --web-dir=www
          
          # Add Android platform
          npx cap add android
          
          echo "Capacitor initialized successfully"

      - name: Setup Gradle Wrapper
        run: |
          cd android
          
          # Create gradle wrapper directory if not exists
          mkdir -p gradle/wrapper
          
          # Check if gradle-wrapper.jar exists
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "Downloading gradle-wrapper.jar..."
            curl -L -o gradle/wrapper/gradle-wrapper.jar \
              https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar
          fi
          
          # Make gradlew executable
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          fi
          
          # Check gradle-wrapper.properties
          if [ ! -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF
          fi
          
          echo "Gradle wrapper setup complete"
          ls -la gradle/wrapper/

      - name: Fix Android Build Issues
        run: |
          cd android
          
          # Update gradle.properties
          cat >> gradle.properties << 'EOF'
android.useAndroidX=true
android.enableJetifier=true
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
EOF
          
          # Check if variables.gradle exists
          if [ ! -f "variables.gradle" ]; then
            cat > variables.gradle << 'EOF'
ext {
    minSdkVersion = 22
    compileSdkVersion = 34
    targetSdkVersion = 34
    androidxActivityVersion = '1.7.0'
    androidxAppCompatVersion = '1.6.1'
    androidxCoordinatorLayoutVersion = '1.2.0'
    androidxCoreVersion = '1.10.0'
    androidxFragmentVersion = '1.5.6'
    coreSplashScreenVersion = '1.0.0'
    androidxWebkitVersion = '1.6.1'
    junitVersion = '4.13.2'
    androidxJunitVersion = '1.1.5'
    androidxEspressoCoreVersion = '3.5.1'
    cordovaAndroidVersion = '10.1.1'
}
EOF
          fi
          
          echo "Android build fixes applied"

      - name: Build Debug APK
        run: |
          echo "Starting APK build..."
          cd android
          
          # Clean first
          ./gradlew clean --no-daemon || true
          
          # Build
          ./gradlew assembleDebug --no-daemon --stacktrace --info
          
          echo "Build complete"

      - name: Check APK
        run: |
          echo "Checking for APK files..."
          find android -name "*.apk" -type f
          
          APK_PATH=$(find android/app/build/outputs -name "*.apk" -type f | head -n 1)
          if [ -n "$APK_PATH" ]; then
            echo "APK found: $APK_PATH"
            echo "APK size: $(du -h $APK_PATH | cut -f1)"
          else
            echo "ERROR: No APK found!"
            echo "Build output contents:"
            ls -R android/app/build/outputs/ || true
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Faraz-Code-Editor-APK
          path: android/app/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: Build Summary
        run: |
          echo "==================================="
          echo "🎉 BUILD SUCCESSFUL!"
          echo "==================================="
          echo "📱 Download APK from Artifacts section"
          echo "==================================="

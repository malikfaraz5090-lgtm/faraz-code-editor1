name: Build APK v2

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          build-tools: 33.0.2
          
      - name: Install Gradle 8.2
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH
          
      - name: Create Android Project
        run: |
          rm -rf android
          mkdir -p android/app/src/main/java/com/faraz/codeeditor
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/assets/www
          
          # settings.gradle
          echo "rootProject.name = 'FarazEditor'" > android/settings.gradle
          echo "include ':app'" >> android/settings.gradle
          
          # build.gradle
          cat > android/build.gradle << 'END'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.0.2'
              }
          }
          END
          
          # gradle.properties
          echo "android.useAndroidX=true" > android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m" >> android/gradle.properties
          
          # app/build.gradle
          cat > android/app/build.gradle << 'END'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.faraz.codeeditor'
              compileSdk 33
              defaultConfig {
                  applicationId 'com.faraz.codeeditor'
                  minSdk 22
                  targetSdk 33
                  versionCode 1
                  versionName '1.0'
              }
              buildTypes {
                  debug { debuggable true }
                  release { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          END
          
          # AndroidManifest.xml
          cat > android/app/src/main/AndroidManifest.xml << 'END'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:allowBackup="true" android:label="Faraz Editor"
                  android:theme="@style/AppTheme" android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true"
                      android:configChanges="orientation|keyboardHidden|screenSize|uiMode">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          END
          
          # MainActivity.java
          cat > android/app/src/main/java/com/faraz/codeeditor/MainActivity.java << 'END'
          package com.faraz.codeeditor;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebSettings;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  WebView wv = new WebView(this);
                  WebSettings ws = wv.getSettings();
                  ws.setJavaScriptEnabled(true);
                  ws.setDomStorageEnabled(true);
                  ws.setAllowFileAccess(true);
                  wv.loadUrl("file:///android_asset/www/index.html");
                  setContentView(wv);
              }
          }
          END
          
          # styles.xml
          cat > android/app/src/main/res/values/styles.xml << 'END'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:statusBarColor">#1e1e1e</item>
              </style>
          </resources>
          END
          
          # strings.xml
          echo '<?xml version="1.0" encoding="utf-8"?>' > android/app/src/main/res/values/strings.xml
          echo '<resources>' >> android/app/src/main/res/values/strings.xml
          echo '    <string name="app_name">Faraz Code Editor</string>' >> android/app/src/main/res/values/strings.xml
          echo '</resources>' >> android/app/src/main/res/values/strings.xml
          
          # Create index.html
          cat > android/app/src/main/assets/www/index.html << 'END'
          <!DOCTYPE html>
          <html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Faraz Editor</title><style>body{font-family:Arial;background:#1e1e1e;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}h1{color:#007acc}</style></head><body><h1>Faraz Code Editor</h1></body></html>
          END
          
      - name: Build APK
        run: |
          cd android
          gradle assembleDebug --no-daemon --stacktrace
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FarazEditor-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

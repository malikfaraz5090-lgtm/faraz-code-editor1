name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0
          target: android-34

      - name: Install Gradle
        run: |
          echo "Installing Gradle 8.5..."
          
          # Download and install Gradle directly
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export GRADLE_HOME=$PWD/gradle-8.5
          export PATH=$GRADLE_HOME/bin:$PATH
          
          # Verify Gradle
          gradle --version
          echo "✅ Gradle installed successfully"

      - name: Create Android Project
        run: |
          echo "Creating fresh Android project..."
          rm -rf android
          mkdir -p android
          
          # Add Gradle to PATH
          export PATH=$PWD/gradle-8.5/bin:$PATH
          
          cd android
          
          # Create settings.gradle
          cat > settings.gradle << 'EOF'
rootProject.name = 'FarazCodeEditor'
include ':app'
EOF
          
          # Create root build.gradle
          cat > build.gradle << 'EOF'
buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.2'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

tasks.register('clean', Delete) {
    delete rootProject.layout.buildDirectory
}
EOF
          
          # Create gradle.properties
          cat > gradle.properties << 'EOF'
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=true
android.nonTransitiveRClass=true
EOF
          
          echo "✅ Root project created"

      - name: Create App Module
        run: |
          export PATH=$PWD/gradle-8.5/bin:$PATH
          
          # Create directories
          mkdir -p android/app/src/main/java/com/faraz/codeeditor
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/assets/www
          
          cd android
          
          # App build.gradle
          cat > app/build.gradle << 'EOF'
apply plugin: 'com.android.application'

android {
    namespace "com.faraz.codeeditor"
    compileSdk 34
    
    defaultConfig {
        applicationId "com.faraz.codeeditor"
        minSdk 22
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
        
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }
    
    buildTypes {
        debug {
            debuggable true
            minifyEnabled false
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
}
EOF
          
          echo "✅ App module created"

      - name: Create Android Source Files
        run: |
          # AndroidManifest.xml
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android"
    xmlns:tools="http://schemas.android.com/tools">
    
    <uses-permission android:name="android.permission.INTERNET" />
    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
    
    <application
        android:allowBackup="true"
        android:icon="@mipmap/ic_launcher"
        android:label="Faraz Code Editor"
        android:supportsRtl="true"
        android:theme="@style/AppTheme"
        android:usesCleartextTraffic="true"
        android:hardwareAccelerated="true"
        tools:targetApi="34">
        
        <activity
            android:name=".MainActivity"
            android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
            android:exported="true"
            android:label="Faraz Code Editor"
            android:theme="@style/AppTheme"
            android:windowSoftInputMode="adjustResize">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
        </activity>
    </application>
</manifest>
EOF
          
          # MainActivity.java
          cat > android/app/src/main/java/com/faraz/codeeditor/MainActivity.java << 'EOF'
package com.faraz.codeeditor;

import android.os.Bundle;
import android.webkit.WebView;
import android.webkit.WebSettings;
import android.webkit.WebViewClient;
import android.webkit.WebChromeClient;
import androidx.appcompat.app.AppCompatActivity;
import android.view.KeyEvent;

public class MainActivity extends AppCompatActivity {
    
    private WebView webView;
    
    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        
        webView = new WebView(this);
        
        WebSettings settings = webView.getSettings();
        settings.setJavaScriptEnabled(true);
        settings.setDomStorageEnabled(true);
        settings.setAllowFileAccess(true);
        settings.setAllowContentAccess(true);
        settings.setDatabaseEnabled(true);
        settings.setCacheMode(WebSettings.LOAD_DEFAULT);
        settings.setUseWideViewPort(true);
        settings.setLoadWithOverviewMode(true);
        settings.setSupportZoom(true);
        settings.setBuiltInZoomControls(true);
        settings.setDisplayZoomControls(false);
        settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
        
        webView.setWebViewClient(new WebViewClient() {
            @Override
            public void onPageFinished(WebView view, String url) {
                super.onPageFinished(view, url);
            }
        });
        
        webView.setWebChromeClient(new WebChromeClient());
        
        webView.loadUrl("file:///android_asset/www/index.html");
        setContentView(webView);
    }
    
    @Override
    public boolean onKeyDown(int keyCode, KeyEvent event) {
        if (keyCode == KeyEvent.KEYCODE_BACK && webView.canGoBack()) {
            webView.goBack();
            return true;
        }
        return super.onKeyDown(keyCode, event);
    }
}
EOF
          
          # styles.xml
          cat > android/app/src/main/res/values/styles.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <style name="AppTheme" parent="Theme.AppCompat.DayNight.NoActionBar">
        <item name="colorPrimary">#1e1e1e</item>
        <item name="colorPrimaryDark">#1a1a1a</item>
        <item name="colorAccent">#007acc</item>
        <item name="android:statusBarColor">#1e1e1e</item>
        <item name="android:navigationBarColor">#1e1e1e</item>
        <item name="android:windowBackground">#1e1e1e</item>
    </style>
</resources>
EOF
          
          # strings.xml
          cat > android/app/src/main/res/values/strings.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <string name="app_name">Faraz Code Editor</string>
</resources>
EOF
          
          # colors.xml
          cat > android/app/src/main/res/values/colors.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <color name="colorPrimary">#1e1e1e</color>
    <color name="colorPrimaryDark">#1a1a1a</color>
    <color name="colorAccent">#007acc</color>
    <color name="white">#FFFFFF</color>
    <color name="black">#000000</color>
</resources>
EOF
          
          echo "✅ Source files created"

      - name: Create App Icon
        run: |
          # Create simple launcher icon using XML
          cat > android/app/src/main/res/drawable/ic_launcher_foreground.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<vector xmlns:android="http://schemas.android.com/apk/res/android"
    android:width="108dp"
    android:height="108dp"
    android:viewportWidth="108"
    android:viewportHeight="108">
    
    <rect
        android:width="108dp"
        android:height="108dp"
        android:fillColor="#1e1e1e"/>
    
    <text
        android:x="54dp"
        android:y="70dp"
        android:textSize="50dp"
        android:text="&lt;/&gt;"
        android:fillColor="#007acc"
        android:textAlignment="center"
        android:fontFamily="monospace"/>
</vector>
EOF
          
          # Create mipmap icons
          for dir in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            cp android/app/src/main/res/drawable/ic_launcher_foreground.xml \
               android/app/src/main/res/$dir/ic_launcher.xml 2>/dev/null || true
            cp android/app/src/main/res/drawable/ic_launcher_foreground.xml \
               android/app/src/main/res/$dir/ic_launcher_round.xml 2>/dev/null || true
          done
          
          echo "✅ App icons created"

      - name: Copy Web Files
        run: |
          echo "📁 Copying web files..."
          
          # Copy each file
          for file in index.html style.css app.js manifest.json service-worker.js; do
            if [ -f "$file" ]; then
              cp "$file" android/app/src/main/assets/www/
              echo "✅ Copied: $file"
            fi
          done
          
          # Copy assets directory
          if [ -d "assets" ]; then
            cp -r assets android/app/src/main/assets/www/
            echo "✅ Copied: assets/"
          fi
          
          # Create default index.html if missing
          if [ ! -f "android/app/src/main/assets/www/index.html" ]; then
            cat > android/app/src/main/assets/www/index.html << 'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Faraz Code Editor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e1e;
            color: #cccccc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .logo { font-size: 64px; margin-bottom: 20px; }
        h1 { color: #007acc; font-size: 32px; margin-bottom: 10px; }
        p { color: #999; font-size: 16px; }
        .version {
            margin-top: 30px;
            padding: 10px 20px;
            background: #2d2d2d;
            border-radius: 5px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="logo">&lt;/&gt;</div>
    <h1>Faraz Code Editor</h1>
    <p>Professional Mobile Code Editor</p>
    <div class="version">v1.0.0</div>
    <script>
        console.log('Faraz Code Editor initialized!');
    </script>
</body>
</html>
EOF
            echo "✅ Created default index.html"
          fi
          
          echo "📋 Assets contents:"
          ls -la android/app/src/main/assets/www/

      - name: Build APK
        run: |
          echo "🔨 Starting APK Build..."
          
          # Add Gradle to PATH
          export GRADLE_HOME=$PWD/gradle-8.5
          export PATH=$GRADLE_HOME/bin:$PATH
          
          cd android
          
          echo "Gradle version:"
          gradle --version
          
          echo ""
          echo "Building debug APK..."
          gradle assembleDebug --no-daemon --stacktrace --build-cache
          
          echo ""
          echo "✅ Build completed!"

      - name: Verify APK
        run: |
          echo "📱 Verifying APK..."
          
          echo "Searching for APK files:"
          find android -name "*.apk" -type f -exec ls -lh {} \;
          
          APK_PATH=$(find android/app/build -name "*.apk" -type f | head -n 1)
          
          if [ -n "$APK_PATH" ]; then
            echo ""
            echo "✅ APK Found: $APK_PATH"
            echo "📦 Size: $(du -h $APK_PATH | cut -f1)"
            
            # Check if APK is valid
            if [ -s "$APK_PATH" ]; then
              echo "✅ APK is valid (non-empty)"
            fi
          else
            echo "❌ No APK found!"
            echo "Build output:"
            find android -type d -name "outputs" -exec ls -R {} \;
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Faraz-Code-Editor-APK
          path: android/app/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/*.apk
          tag_name: v1.0.${{ github.run_number }}
          name: "Faraz Code Editor v1.0.${{ github.run_number }}"
          body: |
            # 🚀 Faraz Code Editor - Android APK
            
            ## 📱 Build Information
            - **Build Number:** #${{ github.run_number }}
            - **Build Date:** $(date +"%Y-%m-%d %H:%M:%S")
            - **Version:** 1.0.${{ github.run_number }}
            - **Min SDK:** Android 5.1 (API 22)
            - **Target SDK:** Android 14 (API 34)
            
            ## ✨ Features
            - ✅ Monaco Editor Integration
            - ✅ HTML/CSS/JS Live Preview
            - ✅ File Management System
            - ✅ PWA Support
            - ✅ Dark Theme
            - ✅ Mobile Optimized
            
            ## 📥 Installation
            1. **Download** the APK file below
            2. **Enable** "Install from Unknown Sources" in Settings
            3. **Install** the APK
            4. **Launch** Faraz Code Editor
            5. **Start Coding!** 🎉
            
            ---
            *Built with ❤️ using GitHub Actions*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        run: |
          echo ""
          echo "========================================="
          echo "  🎉 BUILD SUCCESSFUL!"
          echo "========================================="
          echo ""
          echo "  📱 APK Location: Artifacts section"
          echo "  📦 Download: Actions > This Run > Artifacts"
          echo ""
          echo "========================================="

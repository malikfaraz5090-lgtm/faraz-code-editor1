name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Clean Android Directory
        run: |
          echo "Cleaning old android directory..."
          rm -rf android
          mkdir -p android
          echo "✅ Clean directory created"

      - name: Generate Gradle Wrapper
        run: |
          cd android
          
          # Create wrapper directory
          mkdir -p gradle/wrapper
          
          # Download gradle-wrapper.jar using multiple methods
          echo "Downloading gradle-wrapper.jar..."
          
          # Method 1: Direct download
          wget -O gradle/wrapper/gradle-wrapper.jar \
            "https://services.gradle.org/distributions/gradle-8.5-bin.zip" 2>/dev/null || true
          
          # Method 2: Use curl
          curl -L \
            "https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar \
            --retry 5 \
            --retry-delay 3 \
            --connect-timeout 30 \
            --max-time 300 \
            --fail \
            --silent \
            --show-error
          
          # Verify JAR file
          if [ -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            FILE_SIZE=$(stat -c%s "gradle/wrapper/gradle-wrapper.jar" 2>/dev/null || stat -f%z "gradle/wrapper/gradle-wrapper.jar" 2>/dev/null)
            echo "JAR file size: ${FILE_SIZE} bytes"
            
            if [ "$FILE_SIZE" -gt 10000 ]; then
              echo "✅ Valid JAR file downloaded"
            else
              echo "❌ JAR file too small, trying alternative download..."
              
              # Alternative download from Maven Central
              wget -O gradle/wrapper/gradle-wrapper.jar \
                "https://repo1.maven.org/maven2/org/gradle/gradle-wrapper/8.5/gradle-wrapper-8.5.jar" 2>/dev/null || true
              
              FILE_SIZE2=$(stat -c%s "gradle/wrapper/gradle-wrapper.jar" 2>/dev/null || echo "0")
              if [ "$FILE_SIZE2" -gt 10000 ]; then
                echo "✅ Alternative download successful"
              fi
            fi
          else
            echo "❌ Failed to download JAR"
            exit 1
          fi
          
          # Create wrapper properties
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF
          
          # Create gradlew script
          cat > gradlew << 'EOF'
#!/bin/sh
APP_HOME=$( cd "${0%/*}" > /dev/null && pwd -P ) || exit
if [ -n "$JAVA_HOME" ] ; then
    JAVACMD="$JAVA_HOME/bin/java"
else
    JAVACMD="java"
fi
CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar
exec "$JAVACMD" -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"
EOF
          chmod +x gradlew
          
          # Create gradlew.bat
          cat > gradlew.bat << 'EOF'
@echo off
set DIRNAME=%~dp0
set APP_HOME=%DIRNAME%
set CLASSPATH=%APP_HOME%\gradle\wrapper\gradle-wrapper.jar
java -classpath "%CLASSPATH%" org.gradle.wrapper.GradleWrapperMain %*
EOF
          
          echo "✅ Gradle wrapper setup complete"

      - name: Create Android Project Structure
        run: |
          cd android
          
          # settings.gradle
          cat > settings.gradle << 'EOF'
rootProject.name = 'FarazCodeEditor'
include ':app'
EOF
          
          # Root build.gradle
          cat > build.gradle << 'EOF'
buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.2'
    }
}
allprojects {
    repositories {
        google()
        mavenCentral()
    }
}
tasks.register('clean', Delete) {
    delete rootProject.layout.buildDirectory
}
EOF
          
          # gradle.properties
          cat > gradle.properties << 'EOF'
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=true
android.nonTransitiveRClass=true
EOF
          
          echo "✅ Root project files created"

      - name: Create App Module
        run: |
          # Create app directory structure
          mkdir -p android/app/src/main/java/com/faraz/codeeditor
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/assets/www
          
          # App build.gradle
          cat > android/app/build.gradle << 'EOF'
apply plugin: 'com.android.application'

android {
    namespace "com.faraz.codeeditor"
    compileSdk 34
    
    defaultConfig {
        applicationId "com.faraz.codeeditor"
        minSdk 22
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }
    
    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled false
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
}
EOF
          
          echo "✅ App build.gradle created"

      - name: Create Android Source Files
        run: |
          # AndroidManifest.xml
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android">
    
    <uses-permission android:name="android.permission.INTERNET" />
    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
    
    <application
        android:allowBackup="true"
        android:icon="@mipmap/ic_launcher"
        android:label="Faraz Code Editor"
        android:supportsRtl="true"
        android:theme="@style/AppTheme"
        android:usesCleartextTraffic="true"
        android:hardwareAccelerated="true">
        
        <activity
            android:name=".MainActivity"
            android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
            android:exported="true"
            android:label="Faraz Code Editor"
            android:theme="@style/AppTheme"
            android:windowSoftInputMode="adjustResize">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
        </activity>
    </application>
</manifest>
EOF
          
          # MainActivity.java
          cat > android/app/src/main/java/com/faraz/codeeditor/MainActivity.java << 'EOF'
package com.faraz.codeeditor;

import android.os.Bundle;
import android.webkit.WebView;
import android.webkit.WebSettings;
import android.webkit.WebViewClient;
import android.webkit.WebChromeClient;
import androidx.appcompat.app.AppCompatActivity;

public class MainActivity extends AppCompatActivity {
    
    private WebView webView;
    
    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        
        webView = new WebView(this);
        
        WebSettings settings = webView.getSettings();
        settings.setJavaScriptEnabled(true);
        settings.setDomStorageEnabled(true);
        settings.setAllowFileAccess(true);
        settings.setAllowContentAccess(true);
        settings.setDatabaseEnabled(true);
        settings.setCacheMode(WebSettings.LOAD_DEFAULT);
        settings.setUseWideViewPort(true);
        settings.setLoadWithOverviewMode(true);
        settings.setSupportZoom(true);
        settings.setBuiltInZoomControls(true);
        settings.setDisplayZoomControls(false);
        
        webView.setWebViewClient(new WebViewClient());
        webView.setWebChromeClient(new WebChromeClient());
        
        webView.loadUrl("file:///android_asset/www/index.html");
        setContentView(webView);
    }
    
    @Override
    public void onBackPressed() {
        if (webView.canGoBack()) {
            webView.goBack();
        } else {
            super.onBackPressed();
        }
    }
}
EOF
          
          # styles.xml
          cat > android/app/src/main/res/values/styles.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <style name="AppTheme" parent="Theme.AppCompat.DayNight.NoActionBar">
        <item name="colorPrimary">#1e1e1e</item>
        <item name="colorPrimaryDark">#1a1a1a</item>
        <item name="colorAccent">#007acc</item>
        <item name="android:statusBarColor">#1e1e1e</item>
        <item name="android:navigationBarColor">#1e1e1e</item>
        <item name="android:windowBackground">#1e1e1e</item>
    </style>
</resources>
EOF
          
          # strings.xml
          cat > android/app/src/main/res/values/strings.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <string name="app_name">Faraz Code Editor</string>
</resources>
EOF
          
          echo "✅ Android source files created"

      - name: Copy Web Files
        run: |
          echo "Copying web files to assets..."
          
          # Copy each file if exists
          for file in index.html style.css app.js manifest.json service-worker.js; do
            if [ -f "$file" ]; then
              cp "$file" android/app/src/main/assets/www/
              echo "✅ Copied: $file"
            else
              echo "⚠️ Not found: $file"
            fi
          done
          
          # Copy assets folder
          if [ -d "assets" ]; then
            cp -r assets android/app/src/main/assets/www/
            echo "✅ Copied: assets/"
          fi
          
          echo "Assets contents:"
          ls -la android/app/src/main/assets/www/

      - name: Create Index if Missing
        run: |
          if [ ! -f "android/app/src/main/assets/www/index.html" ]; then
            echo "Creating default index.html..."
            cat > android/app/src/main/assets/www/index.html << 'EOF'
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faraz Code Editor</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #1e1e1e; 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        h1 { color: #007acc; }
    </style>
</head>
<body>
    <h1>🚀 Faraz Code Editor</h1>
</body>
</html>
EOF
          fi

      - name: Build APK
        run: |
          echo "🔨 Starting build..."
          cd android
          
          # Check wrapper
          echo "Checking gradle wrapper..."
          ls -lh gradle/wrapper/gradle-wrapper.jar
          file gradle/wrapper/gradle-wrapper.jar
          
          # Check Java
          java -version
          
          # Build with full output
          ./gradlew assembleDebug --no-daemon --stacktrace --info
          
          echo "✅ Build complete"

      - name: Find APK
        run: |
          echo "Searching for APK..."
          find android -name "*.apk" -type f -exec ls -lh {} \;
          
          APK_COUNT=$(find android -name "*.apk" -type f | wc -l)
          echo "Found ${APK_COUNT} APK file(s)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Faraz-Code-Editor-APK
          path: |
            android/app/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          tag_name: v1.0.${{ github.run_number }}
          name: "Faraz Code Editor v1.0.${{ github.run_number }}"
          body: |
            # 📱 Faraz Code Editor APK
            
            ## Build #${{ github.run_number }}
            
            ### Install:
            1. Download APK
            2. Allow Unknown Sources
            3. Install & Enjoy!
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

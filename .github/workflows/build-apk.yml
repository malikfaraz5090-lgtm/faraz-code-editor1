name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: android-actions/setup-android@v3
        
      - name: Install Gradle
        run: |
          wget https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip gradle-8.5-bin.zip
          echo "$PWD/gradle-8.5/bin" >> $GITHUB_PATH
          
      - name: Create Android Project
        run: |
          rm -rf android
          mkdir -p android/app/src/main/java/com/faraz/codeeditor
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/assets/www
          
          cd android
          
          echo 'rootProject.name = "FarazEditor"' > settings.gradle
          echo 'include ":app"' >> settings.gradle
          
          cat > build.gradle << 'END'
          buildscript {
            repositories {
              google()
              mavenCentral()
            }
            dependencies {
              classpath "com.android.tools.build:gradle:8.2.2"
            }
          }
          allprojects {
            repositories {
              google()
              mavenCentral()
            }
          }
          END
          
          cat > gradle.properties << 'END'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          END
          
          cat > app/build.gradle << 'END'
          apply plugin: "com.android.application"
          android {
            namespace "com.faraz.codeeditor"
            compileSdk 34
            defaultConfig {
              applicationId "com.faraz.codeeditor"
              minSdk 22
              targetSdk 34
              versionCode 1
              versionName "1.0.0"
            }
            buildTypes {
              debug { debuggable true }
              release { minifyEnabled false }
            }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          dependencies {
            implementation "androidx.appcompat:appcompat:1.7.0"
          }
          END

      - name: Create Android Files
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'END'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <application android:allowBackup="true" android:label="Faraz Code Editor" 
              android:theme="@style/AppTheme" android:usesCleartextTraffic="true">
              <activity android:name=".MainActivity" android:exported="true"
                android:configChanges="orientation|keyboardHidden|screenSize|uiMode">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
              </activity>
            </application>
          </manifest>
          END
          
          cat > android/app/src/main/java/com/faraz/codeeditor/MainActivity.java << 'END'
          package com.faraz.codeeditor;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebSettings;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle b) {
              super.onCreate(b);
              WebView wv = new WebView(this);
              WebSettings ws = wv.getSettings();
              ws.setJavaScriptEnabled(true);
              ws.setDomStorageEnabled(true);
              ws.setAllowFileAccess(true);
              wv.loadUrl("file:///android_asset/www/index.html");
              setContentView(wv);
            }
          }
          END
          
          cat > android/app/src/main/res/values/styles.xml << 'END'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
              <item name="android:statusBarColor">#1e1e1e</item>
            </style>
          </resources>
          END
          
          cat > android/app/src/main/res/values/strings.xml << 'END'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="app_name">Faraz Code Editor</string>
          </resources>
          END

      - name: Copy Web Files
        run: |
          if [ -f "index.html" ]; then
            cp index.html android/app/src/main/assets/www/
          else
            echo "<html><body><h1>Faraz Editor</h1></body></html>" > android/app/src/main/assets/www/index.html
          fi
          
          [ -f "style.css" ] && cp style.css android/app/src/main/assets/www/
          [ -f "app.js" ] && cp app.js android/app/src/main/assets/www/
          [ -f "manifest.json" ] && cp manifest.json android/app/src/main/assets/www/

      - name: Build APK
        run: |
          cd android
          gradle assembleDebug --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

name: Codemagic Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build-android:
    name: Build Android APK
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm install -g @capacitor/cli @capacitor/core

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          build-tools: 33.0.0
          target: default

      - name: Create web directory
        run: |
          echo "Creating www directory..."
          mkdir -p www
          cp index.html www/
          cp style.css www/
          cp app.js www/
          cp manifest.json www/
          cp service-worker.js www/
          cp capacitor.config.json www/
          
          # Copy assets if exists
          if [ -d "assets" ]; then
            cp -r assets www/
          fi
          
          echo "Web assets prepared successfully"

      - name: Initialize Capacitor Android Project
        run: |
          npx cap init "Faraz Code Editor" "com.faraz.codeeditor" --web-dir=www
          npx cap add android

      - name: Update Android Configuration
        run: |
          # Update AndroidManifest.xml
          MANIFEST_FILE="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_FILE" ]; then
            # Add internet permission if not exists
            if ! grep -q "android.permission.INTERNET" "$MANIFEST_FILE"; then
              sed -i '' '/<manifest/a\
              <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST_FILE"
            fi
            
            # Add file access permissions
            if ! grep -q "android.permission.READ_EXTERNAL_STORAGE" "$MANIFEST_FILE"; then
              sed -i '' '/<manifest/a\
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' "$MANIFEST_FILE"
            fi
          fi

      - name: Setup Gradle
        run: |
          cd android
          chmod +x gradlew
          
          # Update gradle.properties for better performance
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxPermSize=512m" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Build Debug APK
        if: github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == ''
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
          
      - name: Build Release APK
        if: github.event.inputs.build_type == 'release'
        run: |
          cd android
          # Generate debug keystore for testing
          keytool -genkey -v -keystore app/debug.keystore -alias debug -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Faraz, OU=Dev, O=Faraz, L=City, S=State, C=IN"
          
          ./gradlew assembleRelease --no-daemon

      - name: Find APK files
        id: find_apk
        run: |
          echo "Finding APK files..."
          find android -name "*.apk" -type f
          
          DEBUG_APK=$(find android -name "*-debug.apk" -type f | head -n 1)
          RELEASE_APK=$(find android -name "*-release.apk" -type f | head -n 1)
          
          if [ -n "$DEBUG_APK" ]; then
            echo "debug_apk=$DEBUG_APK" >> $GITHUB_OUTPUT
          fi
          
          if [ -n "$RELEASE_APK" ]; then
            echo "release_apk=$RELEASE_APK" >> $GITHUB_OUTPUT
          fi

      - name: Upload Debug APK
        if: steps.find_apk.outputs.debug_apk != ''
        uses: actions/upload-artifact@v4
        with:
          name: FarazCodeEditor-debug
          path: ${{ steps.find_apk.outputs.debug_apk }}
          retention-days: 30

      - name: Upload Release APK
        if: steps.find_apk.outputs.release_apk != ''
        uses: actions/upload-artifact@v4
        with:
          name: FarazCodeEditor-release
          path: ${{ steps.find_apk.outputs.release_apk }}
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.find_apk.outputs.debug_apk }}
            ${{ steps.find_apk.outputs.release_apk }}
          tag_name: v1.0.${{ github.run_number }}
          name: Faraz Code Editor v1.0.${{ github.run_number }}
          body: |
            # 🚀 Faraz Code Editor - Android Build
            
            ## Build Details
            - **Build Number:** ${{ github.run_number }}
            - **Commit:** ${{ github.sha }}
            - **Branch:** ${{ github.ref_name }}
            - **Build Date:** ${{ github.event.head_commit.timestamp }}
            
            ## Features
            - ✅ Monaco Editor Integration
            - ✅ HTML/CSS/JS Live Preview
            - ✅ File Management System
            - ✅ PWA Support
            - ✅ Dark/Light Themes
            - ✅ Import/Export Files
            
            ## Installation
            1. Download the APK file below
            2. Enable "Install from Unknown Sources" on your Android device
            3. Install the APK
            4. Start coding!
            
            ---
            *Built with ❤️ using Codemagic CI/CD*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Optional: Build App Bundle for Play Store
  build-aab:
    name: Build Android App Bundle
    runs-on: macos-latest
    if: github.event.inputs.build_type == 'release'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm install -g @capacitor/cli @capacitor/core

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html style.css app.js manifest.json service-worker.js www/
          if [ -d "assets" ]; then cp -r assets www/; fi

      - name: Build Android App Bundle
        run: |
          npx cap init "Faraz Code Editor" "com.faraz.codeeditor" --web-dir=www
          npx cap add android
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: FarazCodeEditor-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

name: Generate Gradle Wrapper

on:
  workflow_dispatch:
  push:
    paths:
      - 'android/gradle/wrapper/gradle-wrapper.properties'
    branches: [ main, master ]

jobs:
  generate-wrapper:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Generate Gradle Wrapper
        run: |
          cd android
          # Install Gradle
          wget https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip gradle-8.5-bin.zip
          export PATH=$PATH:$PWD/gradle-8.5/bin
          
          # Generate wrapper
          gradle wrapper --gradle-version 8.5
          
          # Verify
          ls -la gradle/wrapper/gradle-wrapper.jar
          echo "Gradle wrapper generated successfully!"
      
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          git add android/gradle/wrapper/gradle-wrapper.jar
          git add android/gradlew
          git add android/gradlew.bat
          
          # Only commit if changes exist
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add generated gradle-wrapper.jar"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
